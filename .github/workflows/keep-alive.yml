name: Keep Supabase & Render Alive

# Supabase 무료 플랜은 7일간 활동이 없으면 자동 일시정지됩니다.
# 이 워크플로우는 매일 2회 실행되어:
#  1) Render 앱(/api/posts)을 깨워 family-blog Postgres에 활동을 발생시키고,
#  2) 등록된 모든 Supabase 프로젝트의 REST API에 직접 핑을 보내 활동 기록을 남깁니다.
#
# 새 프로젝트 추가 방법:
#   GitHub → Settings → Secrets → 아래와 같은 페어를 등록하면 자동으로 핑됨
#     <PREFIX>_URL        예: CONMGT_URL = https://xxxx.supabase.co
#     <PREFIX>_ANON_KEY   예: CONMGT_ANON_KEY = eyJhbGc...
#   그리고 본 파일의 matrix에 PREFIX 추가.

on:
  schedule:
    # UTC 기준. 02:00 UTC = 11:00 KST, 14:00 UTC = 23:00 KST
    - cron: '0 2,14 * * *'
  workflow_dispatch:    # 수동 실행 가능

jobs:
  # 1. Render 앱 깨우기 (family-blog 전용, 부수적으로 family-blog Supabase도 깨워짐)
  ping-render:
    name: Ping Render app (family-blog)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: GET /api/posts (DB query 발생)
        run: |
          for i in 1 2 3; do
            response=$(curl -sS -m 90 -o /tmp/body.json -w "%{http_code} · %{time_total}s" \
              "https://family-blog-h01n.onrender.com/api/posts?limit=1")
            echo "  attempt $i: $response"
            code="${response%% *}"
            if [ "$code" = "200" ]; then
              echo "  ✓ family-blog Render + Postgres OK"
              exit 0
            fi
            sleep 5
          done
          echo "::warning::family-blog Render unreachable after 3 retries (Render may be down, but Supabase REST 핑이 별도로 시도됩니다)"

  # 2. 각 Supabase 프로젝트에 직접 REST 핑 (옵션 — 부가 안전망)
  #    이 job이 실패해도 워크플로우 전체는 ✅로 처리됨 (continue-on-error).
  #    family-blog는 위의 ping-render에서 이미 DB 활동 발생하므로 충분히 살아있음.
  ping-supabase:
    name: Ping Supabase ${{ matrix.project }} (optional)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    continue-on-error: true   # 인증 형식 차이로 401 떨어져도 워크플로우는 통과
    strategy:
      fail-fast: false
      matrix:
        project:
          - family-blog
          - conmgt
    steps:
      - name: Resolve secrets for ${{ matrix.project }}
        id: resolve
        env:
          FAMILY_BLOG_URL: ${{ secrets.SUPABASE_URL }}
          FAMILY_BLOG_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          CONMGT_URL: ${{ secrets.CONMGT_URL }}
          CONMGT_KEY: ${{ secrets.CONMGT_ANON_KEY }}
        run: |
          case "${{ matrix.project }}" in
            family-blog)  url="$FAMILY_BLOG_URL"; key="$FAMILY_BLOG_KEY" ;;
            conmgt)       url="$CONMGT_URL";      key="$CONMGT_KEY" ;;
            *)            echo "unknown project"; exit 1 ;;
          esac
          if [ -z "$url" ] || [ -z "$key" ]; then
            echo "::warning::secrets not set for ${{ matrix.project }} — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "::add-mask::$url"
          echo "::add-mask::$key"
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "key=$key" >> "$GITHUB_OUTPUT"

      - name: Multi-endpoint ping (try several until one responds)
        if: steps.resolve.outputs.skip != 'true'
        env:
          URL: ${{ steps.resolve.outputs.url }}
          KEY: ${{ steps.resolve.outputs.key }}
        run: |
          # 1) auth health (no key) — checks project alive
          h=$(curl -sS -m 15 -o /dev/null -w "%{http_code}" "$URL/auth/v1/health")
          echo "  /auth/v1/health → HTTP $h"
          # 2) REST root with apikey — triggers DB metadata query
          r=$(curl -sS -m 15 -o /dev/null -w "%{http_code}" \
            -H "apikey: $KEY" -H "Authorization: Bearer $KEY" \
            "$URL/rest/v1/")
          echo "  /rest/v1/      → HTTP $r"
          # 3) auth settings with apikey — also touches DB
          s=$(curl -sS -m 15 -o /dev/null -w "%{http_code}" \
            -H "apikey: $KEY" "$URL/auth/v1/settings")
          echo "  /auth/v1/settings → HTTP $s"

          # 어느 하나라도 200이면 프로젝트는 살아있음
          if [ "$h" = "200" ] || [ "$r" = "200" ] || [ "$s" = "200" ]; then
            echo "  ✓ ${{ matrix.project }} Supabase project is alive."
            exit 0
          fi
          echo "::warning::${{ matrix.project }} all probes returned non-200 (h=$h r=$r s=$s)"
          exit 1
