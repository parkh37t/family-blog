# Fly.io 배포 설정
# 최초 배포: flyctl launch --no-deploy  (앱 이름 입력, region 선택)
# 볼륨 생성: flyctl volumes create family_blog_data --region nrt --size 3
# 시크릿 설정: flyctl secrets set JWT_SECRET=$(openssl rand -hex 32)
# 배포:       flyctl deploy

app = "family-blog"           # flyctl launch 실행 시 자동으로 고유한 이름으로 교체됨
primary_region = "nrt"        # nrt(Tokyo), icn(Seoul) 등 한국에서 가까운 리전 권장

[build]

[env]
  NODE_ENV  = "production"
  PORT      = "3000"
  DATA_DIR  = "/var/data"
  UPLOADS_DIR = "/var/data/uploads"

# 업로드된 사진과 SQLite DB가 저장될 영구 볼륨 마운트
[[mounts]]
  source      = "family_blog_data"
  destination = "/var/data"
  initial_size = "3gb"

[http_service]
  internal_port      = 3000
  force_https        = true
  auto_stop_machines = "stop"    # 무료 한도 내에서 유휴 시 자동 정지
  auto_start_machines = true      # 요청이 들어오면 즉시 시작
  min_machines_running = 0

  [[http_service.checks]]
    interval = "30s"
    timeout  = "5s"
    grace_period = "10s"
    method   = "GET"
    path     = "/healthz"

[[vm]]
  memory    = "256mb"
  cpu_kind  = "shared"
  cpus      = 1
