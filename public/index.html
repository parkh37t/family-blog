<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f4f7fc">
  <title>우리 가족 블로그</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="nav"></header>

  <div class="hero-shell">
    <section class="hero">
      <h1>추억은 순간이지만, 사랑은 영원하다</h1>
    </section>
  </div>

  <main class="container">
    <div class="row-between" style="margin-bottom:4px">
      <div id="chips" class="chips"></div>
      <div style="display:flex;gap:8px">
        <input id="search" class="input" placeholder="검색" style="width:160px;height:36px;font-size:14px">
      </div>
    </div>

    <div id="feed" class="feed"></div>
    <div id="status"></div>
  </main>

  <button id="fab" class="fab hide" title="글쓰기" aria-label="글쓰기">＋</button>

  <script type="module">
    import { api, me, renderNav, renderFooter, formatDate, formatDateShort, escapeHtml, initialOf, toast, imgUrl } from '/js/common.js';

    const user = await me();
    renderNav('home', user);
    renderFooter();

    if (user) document.getElementById('fab').classList.remove('hide');
    document.getElementById('fab').onclick = () => location.href = '/write';

    const state = { category: 'all', q: '' };
    const feedEl = document.getElementById('feed');
    const chipsEl = document.getElementById('chips');
    const statusEl = document.getElementById('status');

    async function loadCategories() {
      const { categories } = await api('/api/posts/categories');
      const total = categories.reduce((a, c) => a + c.count, 0);
      chipsEl.innerHTML = [
        { category: 'all', count: total, label: '전체' },
        ...categories.map(c => ({ ...c, label: c.category })),
      ].map(c => `
        <button class="chip ${state.category === c.category ? 'active' : ''}" data-c="${escapeHtml(c.category)}">
          ${escapeHtml(c.label)} <span class="chip-count">${c.count}</span>
        </button>`).join('');
      chipsEl.querySelectorAll('.chip').forEach(b => {
        b.onclick = () => {
          state.category = b.dataset.c;
          loadFeed(); loadCategories();
        };
      });
    }

    function cardHTML(p) {
      const imgs = p.images || [];
      const cover = p.cover_image || imgs[0]?.filename;
      const src = cover ? escapeHtml(imgUrl(cover)) : null;
      return `
        <article class="feed-card" onclick="location.href='/post/${p.id}'">
          ${src
            ? `<div class="feed-card-media"><img src="${src}" alt="" loading="lazy"></div>`
            : `<div class="feed-card-media placeholder">${escapeHtml((p.title || 'A').charAt(0))}</div>`}
          <div class="feed-card-body">
            <h3 class="feed-card-title">${escapeHtml(p.title)}</h3>
            <div class="feed-card-meta">
              <span>${formatDateShort(p.created_at)}</span>
            </div>
          </div>
        </article>`;
    }

    async function loadFeed() {
      feedEl.innerHTML = '';
      statusEl.innerHTML = '<div class="spinner"></div>';
      const params = new URLSearchParams();
      if (state.category && state.category !== 'all') params.set('category', state.category);
      if (state.q) params.set('q', state.q);
      const { posts } = await api('/api/posts?' + params);
      statusEl.innerHTML = '';
      if (posts.length === 0) {
        statusEl.innerHTML = `
          <div class="empty">
            <div class="empty-art">＋</div>
            <p>아직 게시글이 없어요.</p>
            ${user ? `<a class="btn btn-accent mt-2" href="/write">첫 이야기 쓰기</a>` : ''}
          </div>`;
        return;
      }
      feedEl.innerHTML = posts.map(cardHTML).join('');
    }

    let searchTimer;
    document.getElementById('search').addEventListener('input', (e) => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => { state.q = e.target.value.trim(); loadFeed(); }, 250);
    });

    await loadCategories();
    await loadFeed();
  </script>
</body>
</html>
