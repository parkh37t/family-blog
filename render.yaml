services:
  - type: web
    name: family-blog
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm ci
    startCommand: node seed.js && node server.js
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "22"
      - key: JWT_SECRET
        generateValue: true
      - key: DATA_DIR
        value: /var/data
      - key: UPLOADS_DIR
        value: /var/data/uploads
    disk:
      name: family-blog-data
      mountPath: /var/data
      sizeGB: 1
