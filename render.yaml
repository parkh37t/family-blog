services:
  - type: web
    name: family-blog
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm ci
    startCommand: node seed.js && node server.js
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "22"
      - key: JWT_SECRET
        generateValue: true
      # ↓ 배포 후 Render 대시보드에서 수동 입력 ↓
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_BUCKET
        value: uploads
