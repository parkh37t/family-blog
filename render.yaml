services:
  - type: web
    name: family-blog
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm ci
    # 서버 시작 시 자동으로 ensureSchema/재시도하므로 seed.js를 별도로 실행하지 않음.
    # 첫 데이터 시드는 로컬에서 `npm run setup` 한 번 실행하면 끝.
    startCommand: node server.js
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "22"
      - key: JWT_SECRET
        generateValue: true
      # ↓ 배포 후 Render 대시보드에서 수동 입력 ↓
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_BUCKET
        value: uploads
